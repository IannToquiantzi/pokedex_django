<!DOCTYPE html>
<html>
<head>
    <title>Pokédex</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-4">Pokedex</h1>

    <!-- Formulario -->
    <form method="POST" action="{% url 'add_pokemon' %}" class="d-flex justify-content-center mb-5">
        {% csrf_token %}
        <input type="text" name="name" class="form-control w-50 me-2" placeholder="Buscar Pokémon (ej: pikachu)">
        <button type="submit" class="btn btn-primary">Buscar</button>
    </form>

    <!-- Lista -->
    <div class="row">
        {% for pokemon in pokemons %}
        <div class="col-md-4 mb-4">
            <div class="card bg-secondary text-white shadow">
                <div class="card-body text-center">
                    <h5 class="card-title">{{ pokemon.nombre }}</h5>
                    <img src="{{ pokemon.imagen }}" class="img-fluid" style="height:120px;">
                    <p class="mt-2">Tipo: {{ pokemon.tipo }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
</body>
</html>
